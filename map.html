<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VULCAN — Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600&family=Martian+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root { --void: #050607; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: var(--void); }
    body { cursor: crosshair; }
    #stage { position: fixed; inset: 0; display: block; }
    #label-layer { position: fixed; inset: 0; pointer-events: none; }

    .site-label {
      position: absolute; top: 0; left: 0; will-change: transform, opacity;
      font-family: var(--type-mono); font-size: 11px; letter-spacing: var(--label-track);
      text-transform: uppercase; color: var(--data-bone); white-space: nowrap;
      opacity: 0; transition: opacity 200ms linear;
      text-shadow: 0 0 8px rgba(5,6,7,0.9);
    }
    .site-label::before {
      content: ""; position: absolute; left: -8px; top: 50%; width: 5px; height: 5px;
      border: 1px solid var(--panel-stroke); transform: translate(-2px,-50%) rotate(45deg);
    }

    /* single quiet readout — where we are (ambient / theater), not a telemetry bar */
    #hud-state {
      position: fixed; left: 38px; bottom: 34px; pointer-events: none;
      font-family: var(--type-mono); font-size: 11px; letter-spacing: var(--label-track);
      text-transform: uppercase; color: var(--data-dim);
    }
    #keys {
      position: fixed; right: 38px; bottom: 34px; pointer-events: none; text-align: right;
      font-family: var(--type-mono); font-size: 10px; letter-spacing: var(--label-track);
      text-transform: uppercase; color: var(--data-faint); line-height: 1.7;
    }
    #keys b { color: var(--data-dim); }
  </style>
</head>
<body>
  <canvas id="stage"></canvas>
  <div id="label-layer"></div>
  <div id="hud-state">AMBIENT · SILICON CORRIDOR</div>
  <div id="keys">
    <div>CLICK SITE · <b>DIVE</b></div>
    <div><b>0 / ESC</b> AMBIENT</div>
    <div><b>1–4</b> ORB STATE</div>
  </div>
  <script type="module" src="/src/map/main.js"></script>
</body>
</html>
