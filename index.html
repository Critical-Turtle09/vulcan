<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VULCAN</title>
  <link rel="icon" href="data:," />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600&family=Martian+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── SPEC v1.6 THE STAGE · G1 THE SHELL ──────────────────────────────────────
       Near-black stage, greyscale world, EMBER the single accent, hairline whites.
       Every colour/size below is a token var (--st-* / --fs-* / --sp-*) — no
       hardcoded hues (grep-clean to greyscale + var(--st-ember)). Adaptive scale:
       type + spacing ride clamp() viewport ramps; the flanks are bounded columns and
       the center is strictly between them, so no zone can ever collide (§0). */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: var(--st-bg, #0A0A0C); }
    body {
      cursor: crosshair;                 /* instrument reticle, kept visible */
      color: var(--st-text);
      font-family: var(--type-mono);
      -webkit-font-smoothing: antialiased;
    }

    /* ceremony backdrop (active-display snapshot, G6) + perpetual GPU stage motion */
    #backdrop { position: fixed; inset: 0; z-index: 0; background-color: var(--st-bg);
      background-repeat: no-repeat; background-size: 100% 100%; background-position: center; }
    #bg { position: fixed; inset: 0; z-index: 1; display: block;
      opacity: 0; transition: opacity var(--st-resolve-ms) ease; }
    #bg.up { opacity: 1; }

    /* the shell resolves in on launch (doctrine 11 — never a pop) */
    #shell { position: fixed; inset: 0; z-index: 2;
      opacity: 0; filter: blur(3px); transition: opacity var(--st-resolve-ms) ease, filter var(--st-resolve-ms) ease; }
    #shell.up { opacity: 1; filter: blur(0); }

    /* corner registration ticks (blueprint chrome) */
    .reg { position: fixed; z-index: 3; width: var(--st-reg); height: var(--st-reg);
      border: 0 solid var(--st-hairline-strong); pointer-events: none; }
    .reg-tl { top: var(--sp-gutter); left: var(--sp-gutter); border-top-width: 1px; border-left-width: 1px; }
    .reg-tr { top: var(--sp-gutter); right: var(--sp-gutter); border-top-width: 1px; border-right-width: 1px; }
    .reg-bl { bottom: var(--sp-gutter); left: var(--sp-gutter); border-bottom-width: 1px; border-left-width: 1px; }
    .reg-br { bottom: var(--sp-gutter); right: var(--sp-gutter); border-bottom-width: 1px; border-right-width: 1px; }

    /* ── zones ── flanks are bounded columns; center lives strictly between them ── */
    .flank { position: fixed; top: 0; bottom: 0; width: var(--sp-flank);
      padding: calc(var(--sp-gutter) * 1.4) var(--sp-gutter);
      display: flex; flex-direction: column; z-index: 2; }
    #flank-left  { left: 0; }
    #flank-right { right: 0; text-align: right; }
    .flank-body { flex: 1 1 auto; min-height: 0; padding-top: calc(var(--sp-gutter) * 1.1);
      display: flex; flex-direction: column; gap: calc(var(--sp-gutter) * 1.2); }

    #center { position: fixed; top: 0; bottom: 0; left: var(--sp-flank); right: var(--sp-flank);
      z-index: 2; display: flex; flex-direction: column; align-items: center;
      padding: calc(var(--sp-gutter) * 1.4) var(--sp-gutter); }

    /* ── type roles ── */
    .wordmark { font-family: var(--type-mono); font-weight: 500; font-size: var(--fs-wordmark);
      letter-spacing: 0.22em; padding-left: 0.22em; color: var(--st-text); white-space: nowrap; }
    .mission { font-size: var(--fs-micro); letter-spacing: 0.20em; color: var(--st-text-faint);
      margin-top: 8px; text-transform: uppercase; }

    .clock { display: flex; justify-content: flex-end; align-items: baseline; gap: 0.14em;
      font-variant-numeric: tabular-nums; font-size: var(--fs-clock); font-weight: 500;
      letter-spacing: 0.06em; color: var(--st-text); }
    .clock .sec { color: var(--st-ember); }
    .date { margin-top: 8px; font-size: var(--fs-micro); letter-spacing: 0.26em;
      color: var(--st-text-dim); text-transform: uppercase; font-variant-numeric: tabular-nums; }

    /* section header with a trailing hairline rule to the flank edge */
    .sec-head { display: flex; align-items: center; gap: 10px;
      font-size: var(--fs-label); letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--st-text-dim); white-space: nowrap; }
    .sec-head::after { content: ""; flex: 1 1 auto; height: 1px; background: var(--st-hairline); }
    #flank-right .sec-head { flex-direction: row-reverse; }

    .zone-tag { display: flex; align-items: center; gap: 10px;
      font-size: var(--fs-micro); letter-spacing: 0.26em; text-transform: uppercase;
      color: var(--st-text-faint); white-space: nowrap; }
    .zone-tag::after { content: ""; flex: 1 1 auto; height: 1px; background: var(--st-hairline-faint); }
    #flank-right .zone-tag { flex-direction: row-reverse; }

    /* reserved (empty) content wells — own their bounds now, fill in later slices */
    .well { flex: 1 1 auto; min-height: 0; }
    .corner-foot { margin-top: auto; }
    .ask-hint { margin-top: 12px; font-size: var(--fs-micro); letter-spacing: 0.24em;
      color: var(--st-text-faint); text-transform: uppercase; }
    .ask-hint b { color: var(--st-text-dim); font-weight: 500; }

    /* ── Z6 status strip (top-center) ── */
    #status-strip { display: flex; align-items: center; gap: 0.7em; flex-wrap: nowrap;
      font-size: var(--fs-label); letter-spacing: 0.20em; text-transform: uppercase;
      color: var(--st-text-dim); white-space: nowrap; }
    .ss { display: inline-flex; align-items: center; gap: 0.5em; }
    .ss .dot { width: 6px; height: 6px; border-radius: 50%;
      background: var(--st-text-faint); box-shadow: none;
      transition: background var(--st-resolve-ms) ease, box-shadow var(--st-resolve-ms) ease; }
    .ss.active .dot { background: var(--st-ember); box-shadow: 0 0 8px 1px var(--st-ember-dim); }
    .ss .ss-key { color: var(--st-text-dim); }
    .ss .ss-val { color: var(--st-text); }
    .ss-sep { color: var(--st-text-faint); }

    /* ── Z3 transform field + Z4 orb slot (center) — reserved, orb lands in G3 ── */
    #field { flex: 1 1 auto; width: 100%; min-height: 0; position: relative;
      display: flex; align-items: center; justify-content: center; }
    #orb-slot { width: min(46vh, 46vw); height: min(46vh, 46vw); }

    /* ── Z5 primary directive (bottom-center) — reserved, fills in G2 ── */
    #primary { width: 100%; min-height: calc(var(--sp-gutter) * 3); }
  </style>
</head>
<body>
  <!-- ceremony backdrop (G6) + perpetual GPU stage motion (G1) -->
  <div id="backdrop"></div>
  <canvas id="bg"></canvas>

  <!-- corner registration ticks -->
  <div class="reg reg-tl"></div>
  <div class="reg reg-tr"></div>
  <div class="reg reg-bl"></div>
  <div class="reg reg-br"></div>

  <div id="shell">
    <!-- ═══ Z1 LEFT FLANK ═══ TL wordmark · SYSTEM VITALS (G2) · BL transcript/intent -->
    <aside id="flank-left" class="flank" data-zone="Z1">
      <header class="corner-head">
        <div class="wordmark">V U L C A N</div>
        <div class="mission">BONSAI LAUNCH · v2.1 · THE STAGE</div>
      </header>
      <div class="flank-body">
        <div class="zone-tag">SYSTEM VITALS</div>
        <div class="well"><!-- Z1 waitlist / GH velocity / Vercel / spend — G2 --></div>
      </div>
      <footer class="corner-foot" data-zone="Z8">
        <div class="sec-head">TRANSCRIPT · INTENT LINE</div>
        <div class="well" style="flex:0 0 auto; min-height: calc(var(--sp-gutter) * 2.2)"><!-- transcript + > intent — G5 --></div>
        <div class="ask-hint"><b>HOLD SPACE</b> TO TALK</div>
      </footer>
    </aside>

    <!-- ═══ Z2 RIGHT FLANK ═══ TR clock · COMMAND DECK + AUDIO (G2) · BR launch objectives -->
    <aside id="flank-right" class="flank" data-zone="Z2">
      <header class="corner-head">
        <div class="clock"><span id="clock-hm">--:--</span><span id="clock-sec" class="sec">--</span></div>
        <div class="date" id="clock-date">—</div>
      </header>
      <div class="flank-body">
        <div class="zone-tag">COMMAND DECK</div>
        <div class="well"><!-- Z2 command deck + audio I/O — G2 --></div>
      </div>
      <footer class="corner-foot">
        <div class="sec-head">LAUNCH OBJECTIVES</div>
        <div class="well" style="flex:0 0 auto; min-height: calc(var(--sp-gutter) * 2.2)"><!-- outreach / compliance / distribution — G2 --></div>
      </footer>
    </aside>

    <!-- ═══ CENTER ═══ Z6 status strip · Z3 transform field (Z4 orb) · Z5 primary directive -->
    <main id="center">
      <div id="status-strip" data-zone="Z6">
        <span class="ss" id="ss-core"><span class="dot"></span><span class="ss-key">CORE</span><span class="ss-sep">·</span><span class="ss-val">IDLE</span></span>
        <span class="ss-sep">·</span>
        <span class="ss" id="ss-wire"><span class="dot"></span><span class="ss-key">WIRE</span><span class="ss-sep">·</span><span class="ss-val">STANDBY</span></span>
        <span class="ss-sep">·</span>
        <span class="ss" id="ss-hands"><span class="dot"></span><span class="ss-key">HANDS</span><span class="ss-sep">·</span><span class="ss-val">STANDBY</span></span>
      </div>
      <div id="field" data-zone="Z3">
        <div id="orb-slot" data-zone="Z4"><!-- a5 TWIN HELIX orb — G3 --></div>
      </div>
      <div id="primary" data-zone="Z5"><!-- Bonsai hero number + velocity + deploy — G2 --></div>
    </main>
  </div>

  <script type="module" src="/src/stage/main.js"></script>
</body>
</html>
