<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VULCAN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600&family=Martian+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root { --void: #050607; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: var(--void); }
    body { cursor: none; }
    #stage { position: fixed; inset: 0; display: block; }
    #label-layer { position: fixed; inset: 0; pointer-events: none; }

    /* tethered site marks in the theater */
    .site-label {
      position: absolute; top: 0; left: 0; will-change: transform, opacity;
      font-family: var(--type-mono); font-size: 11px; letter-spacing: var(--label-track);
      text-transform: uppercase; color: var(--data-bone); white-space: nowrap;
      opacity: 0; transition: opacity 180ms linear; text-shadow: 0 0 8px rgba(5,6,7,0.9);
    }
    .site-label::before {
      content: ""; position: absolute; left: -8px; top: 50%; width: 5px; height: 5px;
      border: 1px solid var(--panel-stroke); transform: translate(-2px,-50%) rotate(45deg);
    }

    /* state HUD — quiet mono-caps, bottom-left. Not a telemetry bar (§7). */
    #hud { position: fixed; left: 38px; bottom: 34px; pointer-events: none;
      font-family: var(--type-mono); text-transform: uppercase;
      letter-spacing: var(--label-track); color: var(--data-dim); }
    #hud-region { font-size: 10.5px; color: var(--data-faint); margin-bottom: 8px; }
    #state-name { font-size: 15px; color: var(--data-bone); }
    #state-hint { font-size: 11px; color: var(--data-faint); margin-top: 4px; }
    #voice-muted { font-size: 10.5px; color: var(--data-dim); margin-top: 9px; min-height: 12px;
      opacity: 0; transition: opacity 320ms ease; }
    #voice-offline { font-size: 10.5px; color: var(--signal-ember); margin-top: 4px; min-height: 12px; }
    #keys { position: fixed; right: 38px; bottom: 34px; pointer-events: none;
      font-family: var(--type-mono); font-size: 10.5px; letter-spacing: var(--label-track);
      text-transform: uppercase; color: var(--data-faint); text-align: right; line-height: 1.7; }
    #keys b { color: var(--data-dim); font-weight: 500; }
    #keys .sep { height: 8px; }
  </style>
</head>
<body>
  <canvas id="stage"></canvas>
  <div id="label-layer"></div>
  <div id="hud">
    <div id="hud-region">VULCAN · HOME</div>
    <div id="state-name">IDLE</div>
    <div id="state-hint">AWAITING</div>
    <div id="voice-muted">MIC MUTED</div>
    <div id="voice-offline"></div>
  </div>
  <div id="keys">
    <div><b>T</b> TAIWAN</div>
    <div><b>V</b> VELDHOVEN/EU</div>
    <div><b>N</b> N. AMERICA</div>
    <div><b>K</b> KOREA</div>
    <div><b>0 / ESC</b> HOME</div>
    <div class="sep"></div>
    <div><b>1–4</b> ORB STATE</div>
    <div><b>M</b> MIC MUTE</div>
  </div>
  <script type="module" src="/src/orb/main.js"></script>
</body>
</html>
